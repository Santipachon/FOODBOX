<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0C0B08">
<meta name="robots" content="noindex, nofollow">
<title>FOODBOX · Panel</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%99%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0C0B08; --surface:#16130C; --surface-2:#1E1910; --line:#322A1B; --line-2:#463A24;
    --text:#F7F2E6; --muted:#A99E86; --muted-2:#7B7358;
    --yellow:#F5B301; --yellow-2:#FFCE3A; --ink:#1A1407; --red:#E23A2E; --green:#46B36B;
    --disp:'Anton',Impact,'Arial Black',system-ui,sans-serif;
    --body:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.45;
    -webkit-text-size-adjust:100%;padding-bottom:env(safe-area-inset-bottom)}
  h1,h2,.brand{font-family:var(--disp);letter-spacing:.03em;text-transform:uppercase;font-weight:400}
  a{color:var(--yellow-2)}
  input,textarea,select,button{font:inherit}
  button{cursor:pointer;border:0;border-radius:10px}
  .btn{background:linear-gradient(180deg,var(--yellow-2),var(--yellow));color:var(--ink);font-weight:800;padding:10px 16px}
  .btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line-2);font-weight:700}
  .btn.danger{background:rgba(226,58,46,.16);color:#ff9084;border:1px solid rgba(226,58,46,.4);font-weight:700}
  .field{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
  .field input,.field textarea,.field select{background:var(--bg);border:1px solid var(--line-2);border-radius:9px;
    color:var(--text);padding:9px 11px;font-size:14px;width:100%}
  .field textarea{min-height:64px;resize:vertical}
  .msg{font-size:13px;min-height:18px}
  .msg.err{color:#ff9084}.msg.ok{color:var(--green)}

  /* ---- Login ---- */
  #login{min-height:100dvh;display:grid;place-items:center;padding:24px}
  #loginForm{width:min(94vw,360px);background:var(--surface);border:1px solid var(--line-2);border-radius:18px;
    padding:26px 22px;display:flex;flex-direction:column;gap:14px}
  #loginForm h1{font-size:26px;margin:0 0 4px;background:linear-gradient(180deg,#F4F4F4,#C9C9C9 55%,#7C7C7C);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-align:center}
  #loginForm .sub{text-align:center;color:var(--muted);font-size:12px;margin-top:-8px}

  /* ---- Admin ---- */
  header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;background:rgba(12,11,8,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line)}
  header .brand{font-size:16px;color:var(--yellow)}
  .wrap{max-width:640px;margin:0 auto;padding:14px}
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  #status{font-size:12px;color:var(--muted)}
  .catttl{font-family:var(--disp);font-size:20px;color:var(--yellow-2);letter-spacing:.03em;text-transform:uppercase;margin:18px 2px 10px}

  .prod{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:12px}
  .prod.off{opacity:.65}
  .phead{display:flex;gap:12px;align-items:flex-start}
  .thumb{width:74px;height:74px;flex:none;border-radius:12px;object-fit:cover;background:#0d0b07;border:1px solid var(--line-2)}
  .pmain{flex:1;min-width:0;display:flex;flex-direction:column;gap:9px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .toggles{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--text)}
  .toggles label{display:flex;align-items:center;gap:6px;cursor:pointer}
  .toggles input{width:18px;height:18px;accent-color:var(--yellow)}
  .actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:2px}
  .filebtn{background:var(--surface-2);color:var(--text);border:1px solid var(--line-2);border-radius:10px;
    padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer}
  .rowmsg{font-size:12px;margin-left:auto}
  .hint{font-size:11px;color:var(--muted-2)}
  .add-card{background:var(--surface-2);border:1px dashed var(--line-2)}
</style>
</head>
<body>

<div id="login">
  <form id="loginForm">
    <h1>FOODBOX</h1>
    <div class="sub">Panel de administración</div>
    <div class="field">Correo<input type="email" id="email" autocomplete="username" required></div>
    <div class="field">Contraseña<input type="password" id="pass" autocomplete="current-password" required></div>
    <button class="btn" type="submit">Entrar</button>
    <p class="msg" id="loginMsg"></p>
  </form>
</div>

<div id="admin" hidden>
  <header>
    <span class="brand">FOODBOX · Admin</span>
    <button class="btn ghost" id="logout">Salir</button>
  </header>
  <div class="wrap">
    <div class="toolbar">
      <button class="btn" id="addBtn">+ Añadir producto</button>
      <button class="btn ghost" id="reload">Recargar</button>
      <span id="status"></span>
    </div>
    <p class="hint">Edita y dale <b>Guardar</b> en cada producto. Los cambios se ven en la carta al recargarla.
      Etiquetas útiles: <code>nuevo</code>, <code>mas_pedido</code>, <code>tulio_recomienda</code>.</p>
    <div id="lista"></div>
  </div>
</div>

<div id="addModal" hidden style="position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:22px;background:rgba(6,5,4,.9)">
  <form id="addForm" style="width:min(94vw,360px);background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:22px;display:flex;flex-direction:column;gap:12px">
    <h2 style="margin:0;font-size:20px;color:var(--yellow-2)">Nuevo producto</h2>
    <div class="field">Nombre<input id="newNombre" required></div>
    <div class="field">Categoría<select id="newCat"><option value="hamburguesas">Hamburguesas</option><option value="adiciones">Adiciones</option></select></div>
    <div class="field">Precio<input id="newPrecio" type="number" value="0" min="0"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn" type="submit" style="flex:1">Crear</button>
      <button class="btn ghost" type="button" id="addCancel">Cancelar</button>
    </div>
    <p class="msg" id="addMsg"></p>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL='https://tlaokwavidpxkwohtggt.supabase.co';
  const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsYW9rd2F2aWRweGt3b2h0Z2d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NzE0NTMsImV4cCI6MjEwMDE0NzQ1M30.aFYSxc2lGMx7JvWK2zPBgt7X_g27tfE4CJHwvdxLXc0';
  const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
  const $=s=>document.querySelector(s);
  const money=n=>'$'+Number(n||0).toLocaleString('es-CO');
  const esc=s=>String(s==null?'':s).replace(/"/g,'&quot;').replace(/</g,'&lt;');
  const slug=s=>String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,40);

  // ---------- Auth ----------
  async function init(){
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ mostrarAdmin(); } else { $('#login').hidden=false; $('#admin').hidden=true; }
  }
  function mostrarAdmin(){ $('#login').hidden=true; $('#admin').hidden=false; cargar(); }

  $('#loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const m=$('#loginMsg'); m.textContent='Entrando…'; m.className='msg';
    const { error } = await sb.auth.signInWithPassword({ email:$('#email').value.trim(), password:$('#pass').value });
    if(error){ m.textContent='Correo o contraseña incorrectos.'; m.className='msg err'; }
    else { m.textContent=''; mostrarAdmin(); }
  });
  $('#logout').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

  // ---------- Cargar productos ----------
  const CATS=[['hamburguesas','Hamburguesas'],['adiciones','Adiciones']];
  async function cargar(){
    $('#status').textContent='Cargando…';
    const { data, error } = await sb.from('producto').select('*').order('orden');
    if(error){ $('#status').textContent='Error al cargar: '+error.message; return; }
    const cont=$('#lista'); cont.innerHTML='';
    for(const [cid,cnom] of CATS){
      const items=data.filter(p=>p.categoria_id===cid);
      if(!items.length) continue;
      const h=document.createElement('div'); h.className='catttl'; h.textContent=cnom; cont.appendChild(h);
      items.forEach(p=>cont.appendChild(prodCard(p)));
    }
    $('#status').textContent=data.length+' productos';
  }

  function prodCard(p){
    const el=document.createElement('div');
    el.className='prod'+(p.disponible===false?' off':'');
    el.dataset.id=p.id;
    el.innerHTML=`
      <div class="phead">
        <img class="thumb" src="${esc(p.foto||'')}" alt="" onerror="this.style.visibility='hidden'">
        <div class="pmain">
          <div class="field">Nombre<input class="f-nombre" value="${esc(p.nombre)}"></div>
          <div class="grid2">
            <div class="field">Precio<input class="f-precio" type="number" min="0" value="${p.precio||0}"></div>
            <div class="field">Combo<input class="f-combo" type="number" min="0" value="${p.precio_combo==null?'':p.precio_combo}"></div>
          </div>
          <div class="field">Precio con descuento <span class="hint">(vacío = sin descuento)</span><input class="f-desc" type="number" min="0" value="${p.precio_descuento==null?'':p.precio_descuento}"></div>
          <div class="field">Descripción<textarea class="f-descr">${esc(p.descripcion||'')}</textarea></div>
          <div class="field">Etiquetas <span class="hint">(separadas por coma)</span><input class="f-etq" value="${esc((p.etiquetas||[]).join(', '))}"></div>
          <div class="toggles">
            <label><input type="checkbox" class="f-disp" ${p.disponible!==false?'checked':''}> Disponible</label>
            <label><input type="checkbox" class="f-dest" ${p.destacado?'checked':''}> Destacada</label>
          </div>
          <div class="actions">
            <label class="filebtn">📷 Cambiar foto<input type="file" accept="image/*" class="f-foto" hidden></label>
            <button class="btn save">Guardar</button>
            <button class="btn danger del">Eliminar</button>
            <span class="msg rowmsg"></span>
          </div>
        </div>
      </div>`;
    const msg=el.querySelector('.rowmsg');
    el.querySelector('.save').addEventListener('click',()=>guardar(el,p,msg));
    el.querySelector('.del').addEventListener('click',()=>eliminar(p,msg));
    el.querySelector('.f-foto').addEventListener('change',ev=>subirFoto(ev.target.files[0],p,el,msg));
    return el;
  }

  async function guardar(el,p,msg){
    msg.textContent='Guardando…'; msg.className='msg rowmsg';
    const etq=el.querySelector('.f-etq').value.split(',').map(s=>s.trim()).filter(Boolean);
    const g=c=>el.querySelector(c);
    const upd={
      nombre:g('.f-nombre').value.trim(),
      descripcion:g('.f-descr').value.trim(),
      precio:parseInt(g('.f-precio').value||'0',10),
      precio_combo:g('.f-combo').value===''?null:parseInt(g('.f-combo').value,10),
      precio_descuento:g('.f-desc').value===''?null:parseInt(g('.f-desc').value,10),
      etiquetas:etq,
      disponible:g('.f-disp').checked,
      destacado:g('.f-dest').checked
    };
    const { error } = await sb.from('producto').update(upd).eq('id',p.id);
    if(error){ msg.textContent='Error: '+error.message; msg.className='msg rowmsg err'; }
    else{ msg.textContent='✓ Guardado'; msg.className='msg rowmsg ok'; el.classList.toggle('off',!upd.disponible); Object.assign(p,upd); }
  }

  async function eliminar(p,msg){
    if(!confirm('¿Eliminar "'+p.nombre+'"? No se puede deshacer.')) return;
    msg.textContent='Eliminando…'; msg.className='msg rowmsg';
    const { error } = await sb.from('producto').delete().eq('id',p.id);
    if(error){ msg.textContent='Error: '+error.message; msg.className='msg rowmsg err'; }
    else cargar();
  }

  async function subirFoto(file,p,el,msg){
    if(!file) return;
    msg.textContent='Subiendo foto…'; msg.className='msg rowmsg';
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=p.id+'-'+Date.now()+'.'+ext;
    const up=await sb.storage.from('fotos').upload(path,file,{upsert:true,contentType:file.type});
    if(up.error){ msg.textContent='Error al subir: '+up.error.message; msg.className='msg rowmsg err'; return; }
    const { data:{ publicUrl } } = sb.storage.from('fotos').getPublicUrl(path);
    const { error } = await sb.from('producto').update({foto:publicUrl}).eq('id',p.id);
    if(error){ msg.textContent='Error: '+error.message; msg.className='msg rowmsg err'; return; }
    p.foto=publicUrl; el.querySelector('.thumb').src=publicUrl; el.querySelector('.thumb').style.visibility='visible';
    msg.textContent='✓ Foto actualizada'; msg.className='msg rowmsg ok';
  }

  // ---------- Añadir ----------
  $('#addBtn').addEventListener('click',()=>{ $('#addModal').hidden=false; $('#newNombre').focus(); });
  $('#addCancel').addEventListener('click',()=>{ $('#addModal').hidden=true; });
  $('#addForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const m=$('#addMsg'); m.textContent='Creando…'; m.className='msg';
    const nombre=$('#newNombre').value.trim(); const cat=$('#newCat').value;
    let id=slug(nombre)||('prod-'+Date.now());
    // evita choque de id
    const ex=await sb.from('producto').select('id').eq('id',id);
    if(ex.data&&ex.data.length) id=id+'-'+Math.floor(Math.random()*1000);
    const maxq=await sb.from('producto').select('orden').eq('categoria_id',cat).order('orden',{ascending:false}).limit(1);
    const orden=(maxq.data&&maxq.data[0]?maxq.data[0].orden:0)+1;
    const { error } = await sb.from('producto').insert({
      id,categoria_id:cat,nombre,precio:parseInt($('#newPrecio').value||'0',10),
      etiquetas:[],disponible:true,destacado:false,orden
    });
    if(error){ m.textContent='Error: '+error.message; m.className='msg err'; }
    else{ m.textContent=''; $('#addModal').hidden=true; $('#addForm').reset(); cargar(); }
  });

  $('#reload').addEventListener('click',cargar);
  init();
</script>
</body>
</html>
